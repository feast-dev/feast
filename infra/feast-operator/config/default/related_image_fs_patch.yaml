apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
spec:
  template:
    spec:
      containers:
      - name: manager
        env:
        - name: RELATED_IMAGE_FEATURE_SERVER
          value: quay.io/feastdev/feature-server:0.61.0
        - name: RELATED_IMAGE_CRON_JOB
          value: quay.io/openshift/origin-cli:4.17
