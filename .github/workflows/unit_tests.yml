name: unit-tests

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ ubuntu-latest, macos-14 ]
        exclude:
          - os: macos-14
            python-version: "3.10"

    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install system dependencies
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y make
          elif [ "$RUNNER_OS" = "macOS" ]; then
            # make is already installed on macOS runners
            which make || brew install make
          fi
      - name: Install dependencies
        run: make install-python-dependencies-ci
      - name: Test Python
        run: |
          # Set up environment for Ray workers to access packages
          export PATH="${{ github.workspace }}/.venv/bin:$PATH"

          # Dynamically detect site-packages for uv env
          SITE_PACKAGES=$(uv run python -c "import site; print(site.getsitepackages()[0])")

          # Preserve any existing PYTHONPATH and add repo + site-packages
          export PYTHONPATH="${{ github.workspace }}/sdk/python:${PYTHONPATH}:$SITE_PACKAGES"

          echo "Using PYTHONPATH: $PYTHONPATH"
          echo "Using PATH: $PATH"

          # Ray macOS workarounds
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "=== Applying macOS Ray compatibility workarounds ==="
            export RAY_DISABLE_RUNTIME_ENV_HOOK=1
            export PYTHONDONTWRITEBYTECODE=1
            echo "Applied macOS workarounds for Python ${{ matrix.python-version }}"
          fi

          make test-python-unit
      - name: Minimize uv cache
        run: uv cache prune --ci

  mcp-feature-server-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make
      - name: Install dependencies
        run: make install-python-dependencies-ci
      - name: Start feature server (MCP HTTP)
        run: |
          cd examples/mcp_feature_store
          uv run python -m feast.cli.cli serve --host 127.0.0.1 --port 6566 --workers 1 --no-access-log &
          SERVER_PID=$!
          echo $SERVER_PID > /tmp/feast_server_pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:6566/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:6566/health >/dev/null
      - name: Validate MCP endpoint
        run: |
          rm -f /tmp/mcp_headers /tmp/mcp_headers2 /tmp/mcp_body2

          curl -sS -D /tmp/mcp_headers -o /dev/null --max-time 10 \
            -X POST \
            -H "Accept: application/json, text/event-stream" \
            -H "Content-Type: application/json" \
            -H "mcp-protocol-version: 2025-03-26" \
            --data '{}' \
            http://127.0.0.1:6566/mcp || true

          SESSION_ID=$(grep -i "^mcp-session-id:" /tmp/mcp_headers | head -1 | awk '{print $2}' | tr -d '\r')
          if [ -z "${SESSION_ID}" ]; then
            cat /tmp/mcp_headers || true
            exit 1
          fi

          curl -sS -D /tmp/mcp_headers2 -o /tmp/mcp_body2 --max-time 10 \
            -X POST \
            -H "Accept: application/json, text/event-stream" \
            -H "Content-Type: application/json" \
            -H "mcp-protocol-version: 2025-03-26" \
            -H "mcp-session-id: ${SESSION_ID}" \
            --data '{}' \
            http://127.0.0.1:6566/mcp || true

          grep -Eq "^HTTP/.* 400" /tmp/mcp_headers2
          grep -Eiq "^content-type: application/json" /tmp/mcp_headers2
          grep -Eiq "^mcp-session-id: ${SESSION_ID}" /tmp/mcp_headers2
      - name: Stop feature server
        if: always()
        run: |
          if [ -f /tmp/feast_server_pid ]; then
            kill "$(cat /tmp/feast_server_pid)" || true
          fi
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  unit-test-ui:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: './ui/.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'
          cache-dependency-path: 'ui/yarn.lock'
      - name: Install yarn dependencies
        working-directory: ./ui
        run: yarn install
      - name: Check code formatting
        working-directory: ./ui
        run: yarn format:check
      - name: Build yarn rollup
        working-directory: ./ui
        run: yarn build:lib
      - name: Run yarn tests
        working-directory: ./ui
        run: yarn test --watchAll=false
