name: pr-remote-rbac-integration-tests
# This runs the integration tests related to rbac functionality and remote registry and online features.

on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled

jobs:
  remote-rbac-integration-tests-python:
    if:
      ((github.event.action == 'labeled' && (github.event.label.name == 'approved' || github.event.label.name == 'lgtm' || github.event.label.name == 'ok-to-test')) ||
      (github.event.action != 'labeled' && (contains(github.event.pull_request.labels.*.name, 'ok-to-test') || contains(github.event.pull_request.labels.*.name, 'approved') || contains(github.event.pull_request.labels.*.name, 'lgtm')))) &&
      github.event.pull_request.base.repo.full_name == 'feast-dev/feast'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11" ]
        os: [ ubuntu-latest ]
    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}
      # Memory optimization
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONGC: 1
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.repository.full_name }}  # Uses the full repository name
          ref: ${{ github.ref }}                                  # Uses the ref from the event
          token: ${{ secrets.GITHUB_TOKEN }}                     # Automatically provided token
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: make install-python-dependencies-ci
      - name: Test rbac and remote feature integration tests with memory monitoring
        if: ${{ always() }}
        run: |
          echo "=== Starting RBAC tests with memory monitoring ==="
          echo "Initial memory usage:"
          free -h
          
          # Set memory limits and optimizations
          export PYTHONMALLOC=malloc
          export PYTHONDEVMODE=1
          
          # Set process limits to prevent runaway processes
          ulimit -u 1000  # Limit number of processes
          ulimit -v 15000000  # Limit virtual memory to ~15GB
          
          # Start memory monitoring in background
          (
            while true; do
              echo "$(date '+%H:%M:%S') - Memory: $(free -h | grep Mem | awk '{print $3"/"$2}') - Processes: $(ps aux | wc -l)"
              # Force garbage collection every 30 seconds
              python -c "import gc; gc.collect()" 2>/dev/null || true
              sleep 30
            done
          ) &
          MONITOR_PID=$!
          
          # Run the tests with memory monitoring
          make test-python-integration-rbac-remote
          TEST_EXIT_CODE=$?
          
          # Stop monitoring
          kill $MONITOR_PID 2>/dev/null || true
          
          echo "=== Final status ==="
          echo "Test exit code: $TEST_EXIT_CODE"
          echo "Final memory: $(free -h | grep Mem | awk '{print $3"/"$2}')"
          
          # Force cleanup
          python -c "import gc; gc.collect()" 2>/dev/null || true
          
          exit $TEST_EXIT_CODE
      - name: Minimize uv cache
        run: uv cache prune --ci
