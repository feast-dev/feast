name: pr-integration-tests

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  pull-requests: read

jobs:
  integration-test-python:
    # when using pull_request_target, all jobs MUST have this if check for 'ok-to-test' or 'approved' for security purposes.
    if:
      ((github.event.action == 'labeled' && (github.event.label.name == 'approved' || github.event.label.name == 'lgtm' || github.event.label.name == 'ok-to-test')) ||
      (github.event.action != 'labeled' && (contains(github.event.pull_request.labels.*.name, 'ok-to-test') || contains(github.event.pull_request.labels.*.name, 'approved') || contains(github.event.pull_request.labels.*.name, 'lgtm')))) &&
      github.repository == 'feast-dev/feast'
    runs-on: ubuntu-latest
    name: integration-test-python (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Local/File"
            pytest_k: "(File and sqlite) or (File and milvus) or (RemoteOfflineStore and sqlite) or (RemoteOfflineOidcAuthStore and sqlite) or (RemoteOfflineTlsStore and sqlite)"
            needs_gcp: false
            needs_aws: false
            needs_snowflake: false
          - name: "GCP (BigQuery)"
            pytest_k: "BigQuery or (File and datastore) or (File and bigtable)"
            needs_gcp: true
            needs_aws: false
            needs_snowflake: false
          - name: "AWS (Redshift)"
            pytest_k: "Redshift or (File and dynamodb) or test_lambda_materialization"
            needs_gcp: false
            needs_aws: true
            needs_snowflake: false
          - name: "Snowflake"
            pytest_k: "(Snowflake or test_snowflake_materialization) and not test_historical_features_main"
            needs_gcp: false
            needs_aws: true
            needs_snowflake: true
          - name: "Redis"
            pytest_k: "(File and redis) or (RemoteOfflineStore and redis) or (RemoteOfflineOidcAuthStore and redis) or (RemoteOfflineTlsStore and redis)"
            needs_gcp: false
            needs_aws: false
            needs_snowflake: false
    env:
      OS: ubuntu-latest
      PYTHON: "3.11"
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          # pull_request_target runs the workflow in the context of the base repo
          # as such actions/checkout needs to be explicit configured to retrieve
          # code from the PR.
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          submodules: recursive
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.11"
          architecture: x64
      - name: Authenticate to Google Cloud
        if: ${{ matrix.needs_gcp }}
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Set up gcloud SDK
        if: ${{ matrix.needs_gcp }}
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: Use gcloud CLI
        if: ${{ matrix.needs_gcp }}
        run: gcloud info
      - name: Set up AWS SDK
        if: ${{ matrix.needs_aws }}
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Use AWS CLI
        if: ${{ matrix.needs_aws }}
        run: aws sts get-caller-identity
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: make install-python-dependencies-ci
      - name: Setup Redis Cluster
        run: |
          docker pull vishnunair/docker-redis-cluster:latest
          docker run -d -p 6001:6379 -p 6002:6380 -p 6003:6381 -p 6004:6382 -p 6005:6383 -p 6006:6384 --name redis-cluster vishnunair/docker-redis-cluster
      - name: Test python
        if: ${{ always() }}  # this will guarantee that step won't be canceled and resources won't leak
        env:
          FEAST_SERVER_DOCKER_IMAGE_TAG: ${{ needs.build-docker-image.outputs.DOCKER_IMAGE_TAG }}
          SNOWFLAKE_CI_DEPLOYMENT: ${{ secrets.SNOWFLAKE_CI_DEPLOYMENT }}
          SNOWFLAKE_CI_USER: ${{ secrets.SNOWFLAKE_CI_USER }}
          SNOWFLAKE_CI_PASSWORD: ${{ secrets.SNOWFLAKE_CI_PASSWORD }}
          SNOWFLAKE_CI_ROLE: ${{ secrets.SNOWFLAKE_CI_ROLE }}
          SNOWFLAKE_CI_WAREHOUSE: ${{ secrets.SNOWFLAKE_CI_WAREHOUSE }}
        run: make test-python-integration PYTEST_K='${{ matrix.pytest_k }}'
      - name: Minimize uv cache
        run: uv cache prune --ci
