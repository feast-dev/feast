project: credit_scoring_local
provider: local
offline_store:
    host: postgres.feast.svc.cluster.local
    type: postgres
    port: 5432
    database: ${POSTGRES_DB}
    db_schema: public
    password: ${POSTGRES_PASSWORD}
    user: ${POSTGRES_USER}
online_store:
    type: redis
    connection_string: redis.feast.svc.cluster.local:6379
registry:
    path: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres.feast.svc.cluster.local:5432/${POSTGRES_DB}
    registry_type: sql
    cache_ttl_seconds: 60
    sqlalchemy_config_kwargs:
        echo: false
        pool_pre_ping: true
auth:
    type: no_auth
entity_key_serialization_version: 3
