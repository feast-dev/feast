---
apiVersion: v1
kind: Secret
metadata:
  name: feast-data-stores
stringData:
  redis: |
    connection_string: redis.feast.svc.cluster.local:6379
  sql: |
    path: postgresql+psycopg://postgres@postgres.feast.svc.cluster.local:5432/feast
    cache_ttl_seconds: 60
    sqlalchemy_config_kwargs:
        echo: false
        pool_pre_ping: true

---
apiVersion: feast.dev/v1alpha1
kind: FeatureStore
metadata:
  name: example
spec:
  feastProject: credit_scoring_local
  services:
    offlineStore:
      persistence:
        file:
          type: duckdb
      image: quay.io/tchughesiv/feature-server:0.42.0
      imagePullPolicy: Always
    onlineStore:
      persistence:
        store:
          type: redis
          secretRef:
            name: feast-data-stores
      image: quay.io/tchughesiv/feature-server:0.42.0
      imagePullPolicy: Always
    registry:
      local:
        persistence:
          store:
            type: sql
            secretRef:
              name: feast-data-stores
        image: quay.io/tchughesiv/feature-server:0.42.0
        imagePullPolicy: Always
